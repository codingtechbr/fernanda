<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seu Ebook | Fernanda Meyrelly</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora&display=swap" rel="stylesheet">
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#2B1620;color:#FBF3ED;font-family:'Lora',serif;text-align:center;padding:24px;}
  .box{max-width:480px;}
  h1{font-family:'Playfair Display',serif;font-size:32px;color:#E7CBA6;margin-bottom:16px;}
  p{font-size:16px;line-height:1.6;color:#D9A9AC;}
  .btn{display:inline-block;margin-top:26px;background:#E7CBA6;color:#2B1620;
    font-weight:700;padding:16px 30px;border-radius:2px;text-decoration:none;}
  .spinner{width:34px;height:34px;border:3px solid rgba(231,203,166,0.25);
    border-top-color:#E7CBA6;border-radius:50%;margin:0 auto 20px;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  a{color:#B76E79;}
</style>
</head>
<body>
  <div class="box" id="box">
    <div class="spinner"></div>
    <h1>Confirmando seu pagamento...</h1>
    <p>Só um instante, estamos verificando com a InfinitePay.</p>
  </div>

<script>
async function run(){
  const params = new URLSearchParams(window.location.search);
  const orderNsu = params.get('order_nsu');
  const transactionNsu = params.get('transaction_nsu');
  const slug = params.get('slug') || params.get('invoice_slug');
  const box = document.getElementById('box');

  if (!orderNsu) {
    box.innerHTML = `
      <h1>Não encontramos seu pagamento</h1>
      <p>Se você acabou de pagar, aguarde alguns segundos e recarregue esta página. Se o problema continuar, fale com a gente pelo WhatsApp.</p>
      <a class="btn" href="https://wa.me/5571999916092" target="_blank">Falar no WhatsApp</a>
    `;
    return;
  }

  try {
    const resp = await fetch('/api/verify-payment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ order_nsu: orderNsu, transaction_nsu: transactionNsu, slug })
    });
    const data = await resp.json();

    if (data.paid) {
      const downloadUrl = `/api/download-pdf?order_nsu=${encodeURIComponent(orderNsu)}&transaction_nsu=${encodeURIComponent(transactionNsu || '')}&slug=${encodeURIComponent(slug || '')}`;
      box.innerHTML = `
        <h1>Pagamento confirmado! 🎉</h1>
        <p>Seu ebook <strong>Time de Resultados</strong> está pronto.</p>
        <a class="btn" href="${downloadUrl}">Baixar meu ebook →</a>
      `;
    } else {
      box.innerHTML = `
        <h1>Ainda processando...</h1>
        <p>Seu pagamento pode levar alguns segundos para confirmar. Toque no botão abaixo para tentar de novo.</p>
        <a class="btn" href="javascript:location.reload()">Verificar novamente</a>
      `;
    }
  } catch (err) {
    box.innerHTML = `
      <h1>Algo deu errado</h1>
      <p>Recarregue a página. Se persistir, fale com a gente pelo WhatsApp.</p>
      <a class="btn" href="https://wa.me/5571999916092" target="_blank">Falar no WhatsApp</a>
    `;
  }
}
run();
</script>
</body>
</html>
